name: Deploy theme to production and staging

# Despliega el theme en produccion y staging haciendo `git pull` por SSH en cPanel.
# El working tree de git en cada server ES la carpeta del theme en vivo, asi que
# el pull actualiza los archivos directamente. NO toca uploads ni la base de datos.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Cargar clave SSH de deploy
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Pull en produccion
        # checkout -f -B main: deja el working tree (theme en vivo) exactamente en origin/main,
        # auto-corrigiendo aunque el server este en otra rama. No toca uploads ni la DB.
        run: |
          ssh -p 55222 -o StrictHostKeyChecking=accept-new \
            marcan@207.244.240.169 \
            "cd /home/marcan/public_html/wp-content/themes/marcan-theme && git fetch origin main && git checkout -f -B main origin/main"

      - name: Pull en staging
        # Staging sigue el mismo commit de main que produccion.
        run: |
          ssh -p 55222 -o StrictHostKeyChecking=accept-new \
            newmarcancom@new.marcan.com.pe \
            "cd /home/newmarcancom/public_html/wp-content/themes/marcan-theme && git fetch origin main && git checkout -f -B main origin/main"
